<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Questions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #loadingScreen{
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.464);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader{
            width: 50px;
            height: 50px;
            border: 5px solid #ffffff;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin{
            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div id="loadingScreen">
    <div class="loader"></div>
</div>
<div class="background-animation"></div>

<nav class="navbar">
    <div class="logo">Nexthak</div>
</nav>

<div id="totalCount"></div>

<div id="allQuestions"></div>

<footer>
    <p>© 2026 Nexthak | Built by Sarthak</p>
</footer>

<script>

async function displayAllQuestions() {
    document.getElementById("loadingScreen").style.display = "flex";
    const container =
        document.getElementById("allQuestions");

    const selectedFile =
        localStorage.getItem("questionFile");

    if (!selectedFile) {
        window.location.href = "index.html";
        return;
    }

    try {

        const response =
            await fetch(selectedFile);

        const questions =
            await response.json();

        let title = "Questions";

        if (selectedFile.includes("azure_1")) {
            title = "Azure Questions";
        }
        else if (selectedFile.includes("azure_2")) {
            title = "Azure 2 Questions";
        }
        else if (selectedFile.includes("azure_3")) {
            title = "Azure 3 Questions";
        }

        document.getElementById("totalCount")
            .innerText =
            `${title} (${questions.length})`;

        questions.forEach((q, i) => {

            let optionsHTML = "";
            const correctAnswerText =

                Array.isArray(q.answer)

                    ? q.answer
                        .map(index =>
                            q.options[index]
                        )
                        .join(", ")

                    : q.options[q.answer];

            q.options.forEach((option, index) => {

                optionsHTML += `
                    <p>
                        ${String.fromCharCode(65 + index)}. ${option}
                    </p>
                `;

            });

            container.innerHTML += `

                <div class="question-box">

                    <h3>
                        Q${i + 1}: ${q.question}
                    </h3>

                    ${optionsHTML}

                    <p class="correct-answer">
                        <b>Correct Answer:</b>
                        ${correctAnswerText}
                    </p>

                    <div class="explanation">

                        <b>Explanation:</b>

                        ${
                            q.explanation &&
                            q.explanation.trim() !== ""
                            ? q.explanation
                            : "No explanation available"
                        }

                    </div>

                </div>

            `;

        });

    }
    catch (error) {

        console.error("Error loading questions:", error);

        container.innerHTML = `
            <p>
                Failed to load questions.
            </p>
        `;

    }
    finally {

        // Loading hide
        document.getElementById("loadingScreen").style.display = "none";

    }
   

}

displayAllQuestions();

</script>



</body>
</html>
