<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexthak Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-animation"></div>

    <div class="login-container">
        <div class="login-card">
            <h1>Student Login</h1>
            <p id="quizName">Selected Quiz</p>

            <input
                type="text"
                id="studentName"
                placeholder="Enter your full name"
                autocomplete="off"
            >

            <button onclick="startTest()">Start Mock Test</button>
        </div>
    </div>

    <footer>
        <p>© 2026 Nexthak | Built by Sarthak</p>
    </footer>

    <script>
        const selectedQuiz = localStorage.getItem("selectedQuiz");

        if (!selectedQuiz) {
            window.location.href = "index.html";
        }

        const quizDisplayMap = {
            "data/azure-easy.json": "Azure Fundamentals - Easy",
            "data/azure-medium.json": "Azure Fundamentals - Medium",
            "data/azure-hard.json": "Azure Fundamentals - Hard",
            "data/aws-easy.json": "AWS Cloud Practitioner - Easy",
            "data/java-core.json": "Java Core Quiz",
            "data/aptitude.json": "Aptitude Test"
        };

        document.getElementById("quizName").textContent =
            quizDisplayMap[selectedQuiz] || "Selected Quiz";
    </script>

    <script src="script.js"></script>
</body>
</html>
