<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexthak Result</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background-animation"></div>

    <div class="result-container">

        <div class="result-card">
            <h1>Test Completed 🎉</h1>
            <p id="studentResult"></p>
            <button onclick="goHome()">Take Another Test</button>
        </div>

        <div id="reviewSection" class="review-section"></div>

    </div>

    <footer>
        <p>© 2026 Nexthak | Built by Sarthak</p>
    </footer>

    <script>
        // SECURITY CHECK
        const studentName = localStorage.getItem("studentName");
        const score = localStorage.getItem("score");
        const total = localStorage.getItem("totalQuestions");
        const studentEmail = localStorage.getItem("studentEmail");

        function isCorrect(question, userAnswer) {

            if (Array.isArray(question.answer)) {

                if (!Array.isArray(userAnswer)) {
                    return false;
                }

                return (
                    userAnswer.length ===
                    question.answer.length &&
                    userAnswer.every(ans =>
                        question.answer.includes(ans)
                    )
                );
            }

            return userAnswer === question.answer;
        }

        if (
            !studentName ||
            score === null ||
            total === null
        ) {
            window.location.href = "index.html";
        }

        // PREVENT BACK BUTTON ACCESS
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        const questions = JSON.parse(localStorage.getItem("questionsData")) || [];
        const userAnswers = JSON.parse(localStorage.getItem("userAnswers")) || [];
        const questionTimes =
            JSON.parse(localStorage.getItem("questionTimes")) || [];

        document.getElementById("studentResult").innerHTML =
            `
            <strong>${studentName}</strong><br>
            ${studentEmail}<br><br>
            You scored <strong>${score}/${total}</strong>
            `;

        const reviewSection = document.getElementById("reviewSection");


        questions.forEach((q, index) => {

            const userAnswer =
                userAnswers[index];

            const correct =
                isCorrect(
                    q,
                    userAnswer
                );

            const spentSeconds =
                questionTimes[index] || 0;

            const minutes =
                Math.floor(spentSeconds / 60);

            const seconds =
                spentSeconds % 60;

            const userAnswerText =

                Array.isArray(userAnswer)

                    ? (

                        userAnswer.length > 0

                            ? userAnswer
                                .map(i =>
                                    q.options[i]
                                )
                                .join(", ")

                            : "Not Answered"

                    )

                    : (

                        userAnswer !== null

                            ? q.options[userAnswer]

                            : "Not Answered"

                    );

            const correctAnswerText =

                Array.isArray(q.answer)

                    ? q.answer
                        .map(i =>
                            q.options[i]
                        )
                        .join(", ")

                    : q.options[q.answer];

            const reviewCard =
                document.createElement("div");

            reviewCard.className = "review-card";

            reviewCard.innerHTML = `
                <h3>Q${index + 1}. ${q.question}</h3>
                <p>
                    <strong>Your Answer:</strong>
                    ${userAnswerText}
                </p>

                <p>
                    <strong>Correct Answer:</strong>
                    ${correctAnswerText}
                </p>
                <p>
                <strong>Time Spent:</strong>
                ${String(minutes).padStart(2, "0")}:
                ${String(seconds).padStart(2, "0")}
                </p>
                <p><strong>Explanation:</strong> ${q.explanation || "No explanation available"
                }</p>
                <span class="${correct ? 'correct' : 'wrong'}">
                ${correct ? 'Correct ✅' : 'Wrong ❌'}
                </span>
            `;

            reviewSection.appendChild(reviewCard);
        });

        function goHome() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
